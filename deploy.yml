name: Generate Manifests & Deploy

on:
  push:
    branches: [main, master]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate posts.json and projects.json
        run: python generate_manifest.py

      - name: Commit manifest files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/posts.json _data/projects.json
          git diff --staged --quiet || git commit -m "chore: update manifests [skip ci]"
          git push
