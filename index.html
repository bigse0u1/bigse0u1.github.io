<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <title>Redirecting…</title>

    <!-- 0초 후 /about/으로 자동 이동 -->
    <meta http-equiv="refresh" content="0; url=/about/">

    <!-- 검색엔진에 이 페이지의 실제 주소가 /about/임을 알려줌 -->
    <link rel="canonical" href="/about/">
  </head>
  <body>
    <p>
      자동으로 정보 페이지로 이동합니다.
      잠시 후 이동하지 않으면
      <a href="/about/">여기를 클릭</a>하세요.
    </p>
  </body>
</html>
